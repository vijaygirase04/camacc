<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.04);
        }
        .hero-gradient {
            background: linear-gradient(135deg, #fcf8ff 0%, #f0ecf9 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-background font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="relative min-h-screen flex flex-col items-center justify-center px-6 py-12 hero-gradient overflow-hidden">
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<img alt="Cinematic wide shot of a professional camera on a tripod in a dimly lit studio with soft bokeh" class="w-full h-full object-cover grayscale" data-alt="cinematic wide shot of a professional camera on a tripod in a dimly lit studio with soft bokeh and lens flare" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDcR9CwXS1UahTESEGQJtUv92I8AU7xM557vLeGguookEK4_u1AXX4VCzPVInq3O6n-z5WJKDDiJArFgSTKaYdNH9kv8THXreRFrHKlBfMuEcNPpQ1jSL08SsCRM1gxL4-26wpoaMA68WzGrxx-xoE9vSbKg3IVE28_SSiN15YbRdILhNIgF3B34u5wNcnJD1X7YG0iXUzXN4Bxnwg6U-fGmUt-Jicr-X1i5FoXUB093r7ht3xDfkv4MWnix2z8YHmwdJFrS6IF9ah1"/>
</div>
<div class="absolute top-0 left-0 w-full p-8 z-10 flex justify-center md:justify-start">
<h1 class="text-xl font-bold tracking-tighter text-primary font-h3">LuminaCapture</h1>
</div>
<main class="relative z-10 w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="glass-panel p-8 md:p-12 rounded-xl text-center">
<div class="mb-10">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="photo_library">photo_library</span>
</div>
<h2 class="font-h2 text-h3 text-on-surface mb-2">Access Your Gallery</h2>
<p class="font-body-md text-on-surface-variant">Enter your event details to view and download your professional captures.</p>
</div>
<form class="space-y-6 text-left">
<div class="space-y-2">
<label class="font-label-sm text-on-surface-variant block ml-1" for="event-id">Event ID</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="pin">pin</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary focus:bg-white transition-all text-on-surface placeholder:text-outline-variant font-body-md" id="event-id" placeholder="LUM-2024-XXXX" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-sm text-on-surface-variant block ml-1" for="event-date">Event Date</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="calendar_today">calendar_today</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary focus:bg-white transition-all text-on-surface font-body-md" id="event-date" type="date"/>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-h3 text-body-md shadow-lg shadow-primary/25 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Find My Photos</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<div class="pt-2 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-outline text-lg" data-icon="info">info</span>
<p class="font-label-sm text-on-surface-variant">Available for 30 days after event</p>
</div>
</form>
</div>
<footer class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-6 text-on-surface-variant font-label-sm">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<a class="hover:text-primary transition-colors" href="#">Support</a>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
</div>
</footer>
</main>
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-tertiary opacity-40"></div>
</div>
